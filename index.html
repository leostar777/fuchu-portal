<!DOCTYPE html><html lang="ja"> <head><meta charset="utf-8"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><meta name="viewport" content="width=device-width"><meta name="generator" content="Astro v4.16.18"><title>ふちょぽβ</title><link rel="stylesheet" href="/fuchu-portal/styles.css"></head> <body> <div class="container"> <header> <h1>ふちょぽβ</h1> </header> <!-- InfoStack Section --> <section class="info-stack"> <div class="info-bar info-bar--weather"> <span class="info-bar__icon">☀️</span> <div class="info-bar__content"> <span class="info-bar__text">22°C 晴れ</span>   </div> </div> <div class="info-bar info-bar--fire"> <span class="info-bar__icon">🚒</span> <div class="info-bar__content">  <span class="info-bar__text">火災情報なし</span>  </div> </div> <div class="info-bar info-bar--train"> <span class="info-bar__icon">🚃</span> <div class="info-bar__content">   <span class="info-bar__text">運行正常</span> </div> </div> </section> <main> <!-- 府中市ニュース --> <section class="news-section"> <h2>府中市ニュース</h2> <div id="news" class="news-list">  </div> <button id="more" class="more-btn">もっと見る</button> </section> </main> <footer> <p>&copy; 2025 ふちゅぽβ</p> </footer> </div> <script type="module">
      const all = JSON.parse('{JSON.stringify(news)}');
      let shown = 25;
      document.getElementById('more').addEventListener('click', () => {
        shown += 10;
        const list = document.getElementById('news');
        list.innerHTML = all.slice(0, shown).map((n)=>`
          <article class="news-item">
            <h3><a href="${n.link}" target="_blank">${n.title}</a></h3>
            <time class="news-time">${n.formatted}</time>
          </article>`).join('');
        
        if (shown >= all.length) {
          document.getElementById('more').style.display = 'none';
        }
      });
    </script> </body> </html>
